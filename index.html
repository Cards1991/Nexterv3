<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema Integrado de Gestão Empresarial - WebPro Studio">
    <title>WebPro Studio - Sistema de Gestão Empresarial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/modals.css">
    <link rel="stylesheet" href="css/refined.css">

    <!-- Bootstrap Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Firebase SDK (V8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-analytics.js"></script>

    <!-- Configuração do Firebase -->
    <script src="js/env-loader.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        // Inicialização Global do Firebase
        if (!firebase.apps.length && window.__FIREBASE_CONFIG__) {
            firebase.initializeApp(window.__FIREBASE_CONFIG__);
        }
        if (firebase.apps.length && !window.db) {
            window.db = firebase.firestore();
            window.auth = firebase.auth();
            console.log("✅ Firebase Inicializado.");
        }
    </script>

    <!-- Bibliotecas Externas Essenciais (Carregadas via CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.7.0/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <!-- Leaflet para Mapas -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <!-- Sistema de Carregamento -->
    <script src="js/script-loader.js"></script>
    <script src="js/view-loader.js"></script>
    <script src="js/local-db.js"></script>
</head>

<body class="sidebar-collapsed">
    <div id="toast-container"></div>
    
    <div class="app-container">
        <!-- Componentes Dinâmicos (Sidebar e Header) -->
        <div id="sidebar"></div>
        
        <div class="main-content">
            <div id="header-container"></div>

            <main class="content-wrapper">
                <!-- Botão de Correção (Oculto por padrão) -->
                <div id="data-fix-wrapper" style="display: none; text-align: center; margin-bottom: 1rem;">
                    <button class="btn btn-warning" onclick="fixMissingFuncoes()">
                        Corrigir Funções Faltantes nas Empresas
                    </button>
                </div>
                
                <!-- Conteúdo das Seções -->
                <div id="dynamic-content"></div>
            </main>
        </div>
    </div>

    <!-- Scripts do Sistema (Base) -->
    <script src="js/utils-v4.js"></script>
    <script src="js/data-fix.js"></script>
    <script src="js/global-functions.js"></script>
    <script src="js/app.js"></script>
    <script src="js/ai-assistant.js"></script>
    <script src="js/auto-correction-agent.js"></script>
    <script src="js/custom-fixes.js" defer></script>

    <script>
        // Check for data-fix hash
        if (window.location.hash === '#data-fix') {
            const fixWrapper = document.getElementById('data-fix-wrapper');
            if (fixWrapper) fixWrapper.style.display = 'block';
        }
    </script>
</body>

</html>

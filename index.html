    <script>
        // Garante a inicialização do Firebase se o firebase-config.js falhar
        if (!firebase.apps.length && window.__FIREBASE_CONFIG__) {
            console.warn("⚠️ Inicializando Firebase via env-loader (fallback)...");
            firebase.initializeApp(window.__FIREBASE_CONFIG__);
        }
        if (firebase.apps.length && !window.db) {
            window.db = firebase.firestore();
            window.auth = firebase.auth();
            console.log("✅ Firebase e DB inicializados globalmente.");
        }
    </script>

    <style>
        /* Previne o "flash" da página antes do redirecionamento de login */
        .app-container {

        /* Estilos para a barra de rolagem da agenda */
        .agenda-cards {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 8px;
        }

        /* Scrollbar personalizada para tabelas */
        .table-responsive::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .table-responsive::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        .table-responsive::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        .table-responsive::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Header fixo (sticky) para tabelas */
        .table-responsive table thead.sticky-top {
            position: sticky;
            top: 0;
            z-index: 10;
            background-color: #f8f9fa;
        }

        .agenda-cards::-webkit-scrollbar {
            width: 6px;
        }

        .agenda-cards::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .agenda-cards::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }

        .agenda-cards::-webkit-scrollbar-thumb:hover {
            background: #aaa;
        }

        /* Animação de alerta para cards de manutenção */
        @keyframes blink-alert {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.2);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 20px 10px rgba(255, 255, 255, 0.5);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.2);
            }
        }

        .card-alert-blink {
            animation: blink-alert 1.3s infinite ease-in-out;
            z-index: 10;
            position: relative;
        }

        /* Estilos para o Chat Inteligente */
        .chat-fab {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            background-color: #0d6efd;
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 1050;
            transition: transform 0.3s ease;
        }

        .chat-fab:hover {
            transform: scale(1.1);
        }

        .chat-window {
            display: none;
            position: fixed;
            bottom: 100px;
            right: 25px;
            width: 370px;
            height: 500px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            flex-direction: column;
            z-index: 1040;
            overflow: hidden;
        }

        .chat-window.open {
            display: flex;
        }

        .chat-header {
            background-color: #0d6efd;
            color: white;
            padding: 15px;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h5 {
            margin: 0;
            font-size: 1.1rem;
        }

        .chat-body {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            background-color: #f8f9fa;
        }

        .chat-message {
            margin-bottom: 15px;
            display: flex;
        }

        .chat-message.user {
            justify-content: flex-end;
        }

        .chat-message.assistant .message-bubble {
            background-color: #e9ecef;
            color: #333;
            border-radius: 15px 15px 15px 0;
        }

        .chat-message.user .message-bubble {
            background-color: #0d6efd;
            color: white;
            border-radius: 15px 15px 0 15px;
        }

        .message-bubble {
            padding: 10px 15px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .chat-footer {
            padding: 10px;
            border-top: 1px solid #dee2e6;
            display: flex;
        }

        .chat-footer input {
            border-radius: 20px;
            border: 1px solid #ced4da;
            flex-grow: 1;
            margin-right: 10px;
        }

        .chat-footer button {
            border-radius: 50%;
            width: 40px;
            height: 40px;
        }
    </style>

    <script>
        // Mostra o botão de correção de dados se a URL tiver o hash #data-fix
        if (window.location.hash === '#data-fix') {
            const fixWrapper = document.getElementById('data-fix-wrapper');
            if (fixWrapper) fixWrapper.style.display = 'block';
        }
        // Garantir que a função toggleCampoVeiculo esteja disponível globalmente
        window.toggleCampoVeiculo = window.toggleCampoVeiculo || function () {
            const isPA = document.getElementById('ocorrencia-encaminhado-pa')?.checked;
            const containerVeiculo = document.getElementById('container-veiculo-pa');
            const campoVeiculo = document.getElementById('ocorrencia-veiculo');

            if (!containerVeiculo || !campoVeiculo) return;

            if (isPA) {
                containerVeiculo.style.display = 'block';
                campoVeiculo.setAttribute('required', 'required');
            } else {
                containerVeiculo.style.display = 'none';
                campoVeiculo.removeAttribute('required');
                campoVeiculo.value = '';
            }
        };
    </script>

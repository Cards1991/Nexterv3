<!-- Chat Inteligente (AI Assistant) -->
<div class="chat-fab" id="ai-chat-fab">
    <i class="fas fa-robot"></i>
</div>
<div class="chat-window" id="ai-chat-window">
    <div class="chat-header">
        <h5>Assistente Inteligente</h5>
        <button type="button" class="btn-close btn-close-white" id="ai-chat-close"></button>
    </div>
    <div class="chat-body" id="ai-chat-body">
        <div class="chat-message assistant">
            <div class="message-bubble">
                Olá! Sou seu assistente de gestão. Como posso ajudar hoje?
            </div>
        </div>
    </div>
    <div class="chat-footer">
        <input type="text" class="form-control" id="ai-chat-input" placeholder="Digite sua pergunta...">
        <button class="btn btn-primary" id="ai-chat-send"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

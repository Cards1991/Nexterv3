<!-- Modal Avaliação de Experiência -->
<div class="modal fade" id="modalAvaliacaoExperiencia" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="fas fa-user-check me-2"></i>Avaliação de Experiência (Líder)</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="instrucoes-avaliacao" class="alert alert-info py-2 small">
                    Dê uma nota de 1 a 5 para cada critério abaixo, onde 1 é insuficiente e 5 é excelente.
                </div>

                <form id="form-avaliacao-experiencia">
                    <input type="hidden" id="avaliacao-exp-id">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <strong>Colaborador:</strong> <span id="avaliacao-exp-nome"></span>
                        </div>
                        <div class="col-md-6">
                            <strong>Período:</strong> <span id="avaliacao-exp-periodo"></span>
                        </div>
                    </div>

                    <div id="perguntas-avaliacao-container">
                        <!-- Perguntas serão injetadas via JS -->
                    </div>

                    <div class="mt-3">
                        <label class="form-label fw-bold">Parecer Final do Gestor</label>
                        <select class="form-select border-primary" id="avaliacao-exp-parecer" required>
                            <option value="">Selecione uma decisão...</option>
                            <option value="EFETIVAR">✅ Sugiro a Efetivação / Continuidade</option>
                            <option value="PRORROGAR">⏳ Sugiro a Prorrogação do Contrato</option>
                            <option value="DESLIGAR">❌ Sugiro o Desligamento</option>
                        </select>
                    </div>

                    <div class="mt-3">
                        <label class="form-label small">Observações Gerais (Opcional)</label>
                        <textarea class="form-control" id="avaliacao-exp-obs" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="salvarAvaliacaoExperiencia()">Salvar
                    Avaliação</button>
            </div>
        </div>
    </div>
</div>

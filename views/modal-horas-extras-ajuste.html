<!-- Modal Ajuste de Solicitação de Horas Extras (Controladoria) -->
<div class="modal fade" id="ajusteSolicitacaoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="fas fa-edit me-2"></i>Ajustar Solicitação de Horas Extras</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="form-ajuste-solicitacao">
                <input type="hidden" id="ajuste-solicitacao-id">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Funcionário</label>
                        <select id="ajuste-funcionario-select" class="form-select" required></select>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Data</label>
                            <input type="date" id="ajuste-start-date" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Data Fim (opcional)</label>
                            <input type="date" id="ajuste-end-date" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Hora Início</label>
                            <input type="time" id="ajuste-start-time" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Hora Fim</label>
                            <input type="time" id="ajuste-end-time" class="form-control" required>
                        </div>
                    </div>
                    <div class="mt-3">
                        <label class="form-label">Motivo / Observações</label>
                        <textarea id="ajuste-reason" class="form-control" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary"
                        data-bs-dismiss="modal">Cancelar</button><button type="submit" class="btn btn-primary"><i
                            class="fas fa-save me-1"></i> Salvar Ajustes</button></div>
            </form>
        </div>
    </div>
</div>

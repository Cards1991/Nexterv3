\<style>
    .chamado-card {
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        border: none;
        margin-bottom: 15px;
    }
    .info-label {
        font-size: 0.8rem;
        color: #6c757d;
        text-transform: uppercase;
        margin-bottom: 2px;
    }
    .info-value {
        font-weight: 500;
        margin-bottom: 10px;
    }
    .card-header-custom {
        background-color: #f8f9fa;
        border-bottom: 1px solid #e9ecef;
        border-top-left-radius: 12px;
        border-top-right-radius: 12px;
        padding: 12px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
</style>
<div class="container-fluid px-2 py-3">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="m-0 fw-bold text-primary">Meus Chamados</h3>
    </div>
    <p class="text-muted mb-3">Gerencie os chamados atribuídos a você.</p>

<div class="card">
    <div class="card-header">
        <span>Filtros</span>
        <div class="mt-3">
            <div class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label for="chamados-filtro-data-inicio" class="form-label form-label-sm">De:</label>
                    <input type="date" id="chamados-filtro-data-inicio" class="form-control form-control-sm">
                </div>
                <div class="col-md-3">
                    <label for="chamados-filtro-data-fim" class="form-label form-label-sm">Até:</label>
                    <input type="date" id="chamados-filtro-data-fim" class="form-control form-control-sm">
                </div>
                <div class="col-md-2">
                    <label for="chamados-filtro-status" class="form-label form-label-sm">Status:</label>
                    <select id="chamados-filtro-status" class="form-select form-select-sm">
                        <option value="">Todos</option>
                        <option value="Aberto">Aberto</option>
                        <option value="Em Andamento">Em Andamento</option>
                        <option value="Concluído">Concluído</option>
                        <option value="Cancelado">Cancelado</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="chamados-filtro-maquina" class="form-label form-label-sm">Máquina:</label>
                    <select id="chamados-filtro-maquina" class="form-select form-select-sm">
                        <option value="">Todas</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex justify-content-end">
                    <button class="btn btn-primary btn-sm w-100" id="chamados-btn-filtrar">
                        <i class="fas fa-filter"></i> Filtrar
                    </button>
                </div>
            </div>
        </div>
    </div>
    <div class="card-body p-0">
        <div id="chamados-container" class="table-responsive" style="max-height: 600px; overflow-y: auto;">
            Carregando...
        </div>
    </div>
</div>

<!-- Modal de Finalização -->
<div class="modal fade" id="modalFinalizarChamadoMec" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-success text-white border-0">
                <h5 class="modal-title"><i class="fas fa-check-circle me-2"></i> Finalizar Serviço</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="form-finalizar-chamado-mec">
                    <input type="hidden" id="finalizar-mec-id">
                    <input type="hidden" id="finalizar-mec-maquina-id">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tipo de Manutenção *</label>
                        <select class="form-select" id="finalizar-mec-tipo" required>
                            <option value="">Selecione...</option>
                            <option value="Corretiva">Corretiva</option>
                            <option value="Preventiva">Preventiva</option>
                            <option value="Melhoria">Melhoria</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Motivo da Manutenção *</label>
                        <select class="form-select" id="finalizar-mec-motivo" required>
                            <option value="">Carregando motivos...</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Serviço Realizado / Observações *</label>
                        <textarea class="form-control" id="finalizar-mec-obs" rows="3" placeholder="Descreva o que foi feito..." required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 pt-0 p-4">
                <button type="button" class="btn btn-light w-100 mb-2" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success w-100 m-0" onclick="confirmarConcluirChamado()">
                    <i class="fas fa-save me-2"></i> Salvar e Finalizar
                </button>
            </div>
        </div>
    </div>
</div>
</div> <!-- fecha o container-fluid -->

\<h2 class="page-title">Chamados de Manutenção</h2>
<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <div>
        <p class="text-muted mb-0">Gerencie os chamados de manutenção das máquinas.</p>
    </div>
    <div class="d-flex gap-2">
        <button class="btn btn-primary" onclick="abrirModalNovoChamado()">
            <i class="fas fa-plus-circle"></i> Novo Chamado
        </button>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <span>Filtros</span>
        <div class="mt-3">
            <div class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label for="chamados-filtro-data-inicio" class="form-label form-label-sm">De:</label>
                    <input type="date" id="chamados-filtro-data-inicio" class="form-control form-control-sm">
                </div>
                <div class="col-md-3">
                    <label for="chamados-filtro-data-fim" class="form-label form-label-sm">Até:</label>
                    <input type="date" id="chamados-filtro-data-fim" class="form-control form-control-sm">
                </div>
                <div class="col-md-2">
                    <label for="chamados-filtro-status" class="form-label form-label-sm">Status:</label>
                    <select id="chamados-filtro-status" class="form-select form-select-sm">
                        <option value="">Todos</option>
                        <option value="Aberto">Aberto</option>
                        <option value="Em Andamento">Em Andamento</option>
                        <option value="Concluído">Concluído</option>
                        <option value="Cancelado">Cancelado</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="chamados-filtro-maquina" class="form-label form-label-sm">Máquina:</label>
                    <select id="chamados-filtro-maquina" class="form-select form-select-sm">
                        <option value="">Todas</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex justify-content-end">
                    <button class="btn btn-primary btn-sm w-100" id="chamados-btn-filtrar">
                        <i class="fas fa-filter"></i> Filtrar
                    </button>
                </div>
            </div>
        </div>
    </div>
    <div class="card-body p-0">
        <div id="chamados-container" class="table-responsive" style="max-height: 600px; overflow-y: auto;">
            Carregando...
        </div>
    </div>
</div>

<!-- Modal Novo Chamado de Manutenção -->
<div class="modal fade" id="chamadoManutencaoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-tools me-2"></i>Novo Chamado de Manutenção</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="form-chamado-manutencao">
                <input type="hidden" id="chamado-id">
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label">Máquina <span class="text-danger">*</span></label>
                            <select id="chamados-maquina" class="form-select" required onchange="exibirMotivosFrequentes(this)">
                                <option value="">Selecione uma máquina</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Data <span class="text-danger">*</span></label>
                            <input type="date" id="chamado-data" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">&nbsp;</label>
                            <div class="form-check mt-2">
                                <input class="form-check-input" type="checkbox" id="chamados-maquina-parada">
                                <label class="form-check-label" for="chamados-maquina-parada">
                                    Máquina Parada
                                </label>
                            </div>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Motivo <span class="text-danger">*</span></label>
                            <!-- Motivos frequentes da máquina selecionada aparecem aqui -->
                            <div id="chamados-motivos-frequentes" class="mb-2"></div>
                            <input type="text" id="chamados-motivo" class="form-control" placeholder="Digite o motivo ou clique em uma opção acima..." required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Observações</label>
                            <textarea id="chamados-observacoes" class="form-control" rows="3"
                                placeholder="Descreva o problema ou observações adicionais..."></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-paper-plane me-1"></i> Abrir Chamado
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

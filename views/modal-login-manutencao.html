<!-- Modal Login Manutenção (QR Code) -->
<div class="modal fade" id="modalLoginManutencao" tabindex="-1" aria-hidden="true" data-bs-backdrop="static"
    data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="fas fa-user-lock me-2"></i>Autenticação Necessária</h5>
            </div>
            <div class="modal-body">
                <div class="text-center mb-4">
                    <i class="fas fa-qrcode fa-3x text-primary mb-3"></i>
                    <p>Você escaneou um QR Code de Manutenção.</p>
                    <p class="text-muted">Por favor, faça login para continuar.</p>
                </div>
                <form id="form-login-manutencao">
                    <div class="mb-3">
                        <label class="form-label">E-mail</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                            <input type="email" class="form-control" id="login-manutencao-email" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-key"></i></span>
                            <input type="password" class="form-control" id="login-manutencao-senha" required>
                        </div>
                    </div>
                    <div id="login-manutencao-erro" class="alert alert-danger d-none small"></div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Entrar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

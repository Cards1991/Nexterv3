<h2 class="page-title">Análise de Lotação e Vagas</h2>

<div class="card mb-4">
    <div class="card-header bg-light fw-bold d-flex justify-content-between align-items-center">
        <span><i class="fas fa-chart-bar me-2"></i> Dashboard de Lotação</span>
        <div class="btn-group">
            <button class="btn btn-sm btn-success" onclick="exportarDashboardSetoresExcel()">
                <i class="fas fa-file-excel"></i> Excel
            </button>
            <button class="btn btn-sm btn-primary" onclick="exportarDashboardSetoresWord()">
                <i class="fas fa-file-word"></i> Word
            </button>
        </div>
    </div>
    <div class="card-body">
        <div class="table-responsive" style="max-height: 500px; overflow-y: auto;">
            <table class="table table-sm table-hover table-bordered align-middle" id="table-analise-lotacao">
                <thead class="table-light sticky-top" style="top: 0; z-index: 1;">
                    <tr>
                        <th>Empresa</th>
                        <th>Setor</th>
                        <th class="text-center">Qtd. Ideal</th>
                        <th class="text-center">Qtd. Atual</th>
                        <th class="text-center">Reposições Pend.</th>
                        <th class="text-center">Admissões Pend.</th>
                        <th class="text-center">Faltas Hoje</th>
                        <th class="text-center">Sumidos</th>
                        <th class="text-center">Gap (Atual - Ideal)</th>
                    </tr>
                </thead>
                <tbody id="tabela-dashboard-setores">
                    <tr>
                        <td colspan="9" class="text-center text-muted">Carregando indicadores...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

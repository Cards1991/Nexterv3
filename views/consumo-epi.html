<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="page-title mb-0">Consumo de EPI</h2>
    <div class="btn-group shadow-sm">
        <button class="btn btn-primary px-3" id="btn-novo-consumo" onclick="abrirModalConsumoEPI()">
            <i class="fas fa-hand-holding-medical me-2"></i>Registrar Entrega
        </button>
        <button class="btn btn-warning px-3 text-white" onclick="reprocessarCustosEPI()" title="Reprocessar Custos">
            <i class="fas fa-sync-alt"></i>
        </button>
    </div>
</div>

<!-- Dashboard de Consumo Rápido -->
<div class="row g-3 mb-4">
    <div class="col-md-3">
        <div class="card border-0 shadow-sm bg-primary text-white h-100 p-3">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h6 class="mb-1 opacity-75">Entregas (Mês)</h6>
                    <h3 class="mb-0 fw-bold" id="dash-epi-total-entregas">0</h3>
                </div>
                <div class="bg-white bg-opacity-25 rounded p-2">
                    <i class="fas fa-box-open fa-lg"></i>
                </div>
            </div>
            <div class="mt-3 small">
                <span class="opacity-75" id="dash-epi-vencimentos-hoje">0</span> CA vencidos hoje
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card border-0 shadow-sm bg-success text-white h-100 p-3">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h6 class="mb-1 opacity-75">Investimento (Mês)</h6>
                    <h3 class="mb-0 fw-bold" id="dash-epi-custo-total">R$ 0,00</h3>
                </div>
                <div class="bg-white bg-opacity-25 rounded p-2">
                    <i class="fas fa-dollar-sign fa-lg"></i>
                </div>
            </div>
            <div class="mt-3 small">
                Custo médio p/ colaborador
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card border-0 shadow-sm h-100 p-3 border-start border-4 border-warning">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h6 class="text-muted mb-1">EPI mais entregue</h6>
                    <h5 class="mb-0 fw-bold text-dark" id="dash-epi-mais-entregue">---</h5>
                </div>
                <div class="text-warning opacity-50">
                    <i class="fas fa-chart-line fa-2x"></i>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card border-0 shadow-sm h-100 p-3 border-start border-4 border-info">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h6 class="text-muted mb-1">Setor com maior consumo</h6>
                    <h5 class="mb-0 fw-bold text-dark" id="dash-epi-setor-consumo">---</h5>
                </div>
                <div class="text-info opacity-50">
                    <i class="fas fa-users-cog fa-2x"></i>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-header bg-white py-3 border-bottom d-flex justify-content-between align-items-center">
        <h5 class="mb-0 fw-bold text-primary"><i class="fas fa-list me-2"></i>Histórico de Entregas</h5>
        <div class="d-flex gap-2">
            <div class="input-group input-group-sm" style="width: 250px;">
                <span class="input-group-text bg-light"><i class="fas fa-search"></i></span>
                <input type="text" class="form-control" id="filtro-consumo-nome" placeholder="Filtrar por nome...">
            </div>
            <div class="d-flex gap-1 align-items-center">
                <input type="date" class="form-control form-control-sm" id="filtro-consumo-inicio">
                <span class="text-muted mx-1">até</span>
                <input type="date" class="form-control form-control-sm" id="filtro-consumo-fim">
            </div>
            <button class="btn btn-sm btn-primary px-3" onclick="carregarHistoricoConsumoEPI()">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive" id="container-historico-consumo-epi" style="max-height: 60vh;">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light sticky-top">
                    <tr>
                        <th class="ps-4">Data</th>
                        <th>Colaborador</th>
                        <th>EPI Entregue</th>
                        <th>C.A</th>
                        <th class="text-center">Qtd</th>
                        <th>Responsável</th>
                        <th class="text-end pe-4">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-consumo-epi">
                    <tr>
                        <td colspan="7" class="text-center py-5 text-muted">
                            <i class="fas fa-spinner fa-spin fa-2x mb-2 d-block"></i>
                            Carregando histórico...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<style>
#container-historico-consumo-epi::-webkit-scrollbar {
    width: 6px;
}
#container-historico-consumo-epi::-webkit-scrollbar-thumb {
    background: #dee2e6;
    border-radius: 10px;
}
#container-historico-consumo-epi::-webkit-scrollbar-track {
    background: transparent;
}
.table thead th {
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    color: #666;
    border-top: none;
}
.table tbody td {
    font-size: 0.9rem;
    padding-top: 15px;
    padding-bottom: 15px;
}
</style>

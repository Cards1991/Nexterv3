<div class="modal fade" id="empresaModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-building me-2"></i>Nova Empresa</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="form-empresa">
                    <div class="mb-3">
                        <label class="form-label">Nome da Empresa</label>
                        <input type="text" class="form-control" id="nome-empresa" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">CNPJ</label>
                        <input type="text" class="form-control" id="cnpj-empresa">
                    </div>
                    <div class="mb-3">
                        <label for="logo-file-empresa" class="form-label">Logo da Empresa</label>
                        <input class="form-control" type="file" id="logo-file-empresa"
                            accept="image/png, image/jpeg, image/gif, image/svg+xml">
                        <div class="text-center mt-2">
                            <img id="logo-preview-empresa" src="" alt="Pré-visualização do logo"
                                style="max-height: 80px; max-width: 100%; display: none;"
                                onerror="this.style.display='none'; this.onerror=null;">
                        </div>
                        <!-- Campo oculto para manter o nome do arquivo para a lógica atual -->
                        <input type="hidden" id="logo-url-empresa">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Funções (separadas por vírgula)</label>
                        <textarea class="form-control" id="funcoes-empresa" rows="3"
                            placeholder="Ex: Analista, Gerente, Operador, Auxiliar"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="empresa-check-patronal">
                                <label class="form-check-label" for="empresa-check-patronal">Patronal (%)</label>
                            </div>
                            <input type="number" step="0.01" class="form-control d-none" id="empresa-input-patronal">
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="empresa-check-terceiro">
                                <label class="form-check-label" for="empresa-check-terceiro">Terceiros (%)</label>
                            </div>
                            <input type="number" step="0.01" class="form-control d-none" id="empresa-input-terceiro">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="salvarEmpresa()">Salvar Empresa</button>
            </div>
        </div>
    </div>
</div>

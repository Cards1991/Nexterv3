<div class="container-fluid section-mecanico animate__animated animate__fadeIn">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 mb-0"><i class="fas fa-hard-hat me-2"></i> Painel do Mecânico</h2>
        <div id="mecanico-user-info" class="small text-muted"></div>
    </div>

    <!-- Estatísticas Rápidas -->
    <div class="row g-3 mb-4">
        <div class="col-4">
            <div class="mecanico-stat-chip">
                <span class="num text-warning" id="mec-stat-abertos">0</span>
                <span class="small text-uppercase">Abertos</span>
            </div>
        </div>
        <div class="col-4">
            <div class="mecanico-stat-chip">
                <span class="num text-info" id="mec-stat-andamento">0</span>
                <span class="small text-uppercase">Em Curso</span>
            </div>
        </div>
        <div class="col-4">
            <div class="mecanico-stat-chip">
                <span class="num text-danger" id="mec-stat-urgentes">0</span>
                <span class="small text-uppercase">Urgentes</span>
            </div>
        </div>
    </div>

    <!-- Filtros -->
    <div class="d-flex gap-2 mb-4 overflow-auto pb-2">
        <div class="filter-tab-mecanico active" data-filter="meus">Meus Chamados</div>
        <div class="filter-tab-mecanico" data-filter="abertos">Disponíveis</div>
        <div class="filter-tab-mecanico" data-filter="concluidos">Concluídos</div>
    </div>

    <!-- Lista de Chamados -->
    <div id="lista-chamados-mecanico" class="row">
        <div class="text-center p-5">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p class="mt-2">Sincronizando com a oficina...</p>
        </div>
    </div>
</div>

<!-- Modal Finalizar (Reutiliza lógica da ISO Manutenção) -->
<div class="modal fade" id="modalMecanicoFinalizar" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header border-secondary">
                <h5 class="modal-title">Finalizar Chamado</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalMecanicoFinalizarCorpo">
                <!-- Conteúdo dinâmico -->
            </div>
        </div>
    </div>
</div>

<div class="content-section" id="cadastro-mecanicos">
<h2 class="page-title">👷 Cadastro de Mecânicos - Gerente de Manutenção</h2>

<div class="row mb-4">
    <div class="col-md-3">
        <select class="form-select" id="filtro-tipo-mecanico">
            <option value="">Todos Mecânicos</option>
            <option value="gerente">Gerentes</option>
            <option value="mecanico">Mecânicos Normais</option>
            <option value="inativo">Inativos</option>
        </select>
    </div>
    <div class="col-md-3">
        <select class="form-select" id="filtro-setor-mecanico">
            <option value="">Todos Setores</option>
        </select>
    </div>
    <div class="col-md-3">
        <select class="form-select" id="filtro-status-mecanico">
            <option value="">Todos Status</option>
            <option value="Ativo">Ativo</option>
            <option value="Inativo">Inativo</option>
        </select>
    </div>
    <div class="col-md-3">
        <button class="btn btn-outline-secondary" onclick="window.carregarListaMecanicos()">
            <i class="fas fa-sync-alt"></i> Filtrar
        </button>
        <button class="btn btn-success ms-2" onclick="window.exportarListaMecanicos()">
            <i class="fas fa-download"></i> Exportar
        </button>
    </div>
</div>

<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="fas fa-list"></i> Lista de Mecânicos (<span id="total-mecanicos">0</span>)</span>
        <button class="btn btn-primary" onclick="window.abrirModalNovoMecanico()">
            <i class="fas fa-plus"></i> Novo Mecânico
        </button>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Nome</th>
                        <th>Matrícula</th>
                        <th>Setor</th>
                        <th>Nível</th>
                        <th>WhatsApp</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-mecanicos">
                    <tr><td colspan="7" class="text-center"><i class="fas fa-spinner fa-spin"></i></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal de Mecânico -->
<div class="modal fade" id="modalMecanico" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalMecanicoTitle">Novo Mecânico</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formMecanico">
                    <input type="hidden" id="mecanicoId">
                    <div class="mb-3">
                        <label class="form-label">Nome Completo *</label>
                        <input type="text" class="form-control" id="nomeMecanico" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Matrícula</label>
                            <input type="text" class="form-control" id="matriculaMecanico">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Telefone/WhatsApp *</label>
                            <input type="tel" class="form-control" id="telefoneMecanico" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Setor</label>
                        <select class="form-select" id="setorMecanico">
                            <option value="">Selecione...</option>
                        </select>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Nível</label>
                            <select class="form-select" id="nivelMecanico">
                                <option value="mecanico">Mecânico Normal</option>
                                <option value="gerente">Gerente de Mecânicos</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="statusMecanico">
                                <option value="Ativo">Ativo</option>
                                <option value="Inativo">Inativo</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="window.salvarMecanico()">Salvar Mecânico</button>
            </div>
        </div>
    </div>
</div>

</div>

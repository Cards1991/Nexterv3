<div class="content-section" id="cadastro-mecanicos">
<h2 class="page-title">👷 Cadastro de Mecânicos - Gerente de Manutenção</h2>

<div class="row mb-4">
    <div class="col-md-3">
        <select class="form-select" id="filtro-tipo-mecanico">
            <option value="">Todos Mecânicos</option>
            <option value="gerente">Gerentes</option>
            <option value="mecanico">Mecânicos Normais</option>
            <option value="inativo">Inativos</option>
        </select>
    </div>
    <div class="col-md-3">
        <select class="form-select" id="filtro-setor-mecanico">
            <option value="">Todos Setores</option>
        </select>
    </div>
    <div class="col-md-3">
        <select class="form-select" id="filtro-status-mecanico">
            <option value="">Todos Status</option>
            <option value="Ativo">Ativo</option>
            <option value="Inativo">Inativo</option>
        </select>
    </div>
    <div class="col-md-3">
        <button class="btn btn-outline-secondary" onclick="window.carregarListaMecanicos()">
            <i class="fas fa-sync-alt"></i> Filtrar
        </button>
        <button class="btn btn-success ms-2" onclick="window.exportarListaMecanicos()">
            <i class="fas fa-download"></i> Exportar
        </button>
    </div>
</div>

<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="fas fa-list"></i> Lista de Mecânicos (<span id="total-mecanicos">0</span>)</span>
        <button class="btn btn-primary" onclick="window.abrirModalNovoMecanico()">
            <i class="fas fa-plus"></i> Novo Mecânico
        </button>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Nome</th>
                        <th>Matrícula</th>
                        <th>Setor</th>
                        <th>Nível</th>
                        <th>WhatsApp</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-mecanicos">
                    <tr><td colspan="7" class="text-center"><i class="fas fa-spinner fa-spin"></i></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal de Mecânico -->
<div class="modal fade" id="modalMecanico" tabindex="-1">
<div class="modal-dialog modal-lg">
        <div class="modal-content shadow-lg border-0">
            <div class="modal-header bg-gradient-primary text-white border-0 rounded-top">
                <h5 class="modal-title mb-0 fw-bold" id="modalMecanicoTitle">
                    <i class="fas fa-user-hard-hat me-2"></i>Novo Mecânico
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="formMecanico">
                    <input type="hidden" id="mecanicoId">
                    <!-- Nome Completo removed - auto-filled from employee select -->
    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <label class="form-label fw-bold">👤 Funcionário Existente *</label>
            <select class="form-select form-select-lg shadow-sm" id="selectFuncionarioExistente">
                <option value="">-- Selecione ou crie novo --</option>
            </select>
        </div>
        <div class="col-md-6 d-flex align-items-end">
            <button type="button" class="btn btn-outline-info btn-lg w-100" onclick="loadAllEmployees()">
                <i class="fas fa-search me-2"></i>🔍 Buscar Todos
            </button>
        </div>
        <div class="col-md-6">
            <label class="form-label fw-bold">📄 Matrícula</label>
            <input type="text" class="form-control form-control-lg shadow-sm" id="matriculaMecanico" placeholder="Opcional - auto-preenchida">
        </div>
        <div class="col-md-6">
            <label class="form-label fw-bold text-success">📱 Telefone/WhatsApp *</label>
            <input type="tel" class="form-control form-control-lg shadow-sm border-success" id="telefoneMecanico" required placeholder="(42) 99999-9999">
        </div>
    </div>
        <div class="col-12 mb-4">
            <label class="form-label fw-bold">🏭 Setor *</label>
            <select class="form-select form-select-lg shadow-sm" id="setorMecanico" required>
                <option value="">Selecione o setor...</option>
            </select>
        </div>
        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <label class="form-label fw-bold text-primary">⭐ Nível *</label>
                <select class="form-select form-select-lg shadow-sm" id="nivelMecanico" required>
                    <option value="mecanico">🔧 Mecânico Normal</option>
                    <option value="gerente">👨‍💼 Gerente de Mecânicos</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">📊 Status *</label>
                <select class="form-select form-select-lg shadow-sm" id="statusMecanico" required>
                    <option value="Ativo">✅ Ativo</option>
                    <option value="Inativo">⏸️ Inativo</option>
                </select>
            </div>
        </div>
                </form>
            </div>
            <div class="modal-footer bg-light border-top rounded-bottom">
                <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">
                    <i class="fas fa-times me-2"></i>Cancelar
                </button>
                <button type="button" class="btn btn-success btn-lg px-5 shadow-sm" onclick="window.salvarMecanico()">
                    <i class="fas fa-save me-2"></i>Salvar Mecânico
                </button>
            </div>
        </div>
    </div>
</div>

</div>

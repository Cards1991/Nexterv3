<!-- Modal Setor -->
<div class="modal fade" id="setorModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="setorModalTitle">Novo Setor</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="form-setor">
                    <input type="hidden" id="setor-id">
                    
                    <div class="mb-3">
                        <label class="form-label">Empresa</label>
                        <select class="form-select" id="setor-empresa" required>
                            <option value="">Carregando...</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nome do Setor</label>
                        <input type="text" class="form-control" id="setor-descricao" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Gerente Responsável</label>
                        <select class="form-select" id="setor-gerente">
                            <option value="">Nenhum</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Qtd. Ideal de Funcionários</label>
                            <input type="number" class="form-control" id="setor-qtd-ideal" min="0">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Horário de Entrada</label>
                            <input type="time" class="form-control" id="setor-horario-entrada">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Observações</label>
                        <textarea class="form-control" id="setor-observacao" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="salvarSetor()">Salvar</button>
            </div>
        </div>
    </div>
</div>

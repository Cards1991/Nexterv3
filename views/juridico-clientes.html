<h2 class="page-title">Gestão de Clientes Jurídicos</h2>

<div class="d-flex justify-content-between align-items-center mb-4">
    <div class="input-group" style="max-width: 400px;">
        <span class="input-group-text"><i class="fas fa-search"></i></span>
        <input type="text" class="form-control" id="jur-cli-busca" placeholder="Buscar cliente...">
    </div>
    <button class="btn btn-primary" onclick="abrirModalClienteJuridico()">
        <i class="fas fa-plus-circle"></i> Novo Cliente
    </button>
</div>

<!-- Métricas de Clientes -->
<div class="row mb-4">
    <div class="col-md-3">
        <div class="card bg-primary text-white">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <div>
                        <div class="fs-4 fw-bold" id="jur-cli-total">0</div>
                        <small>Total de Clientes</small>
                    </div>
                    <i class="fas fa-users fa-2x opacity-50"></i>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card bg-success text-white">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <div>
                        <div class="fs-4 fw-bold" id="jur-cli-ativos">0</div>
                        <small>Clientes Ativos</small>
                    </div>
                    <i class="fas fa-check-circle fa-2x opacity-50"></i>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card bg-warning text-white">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <div>
                        <div class="fs-4 fw-bold" id="jur-cli-score-medio">0</div>
                        <small>Score Médio (IA)</small>
                    </div>
                    <i class="fas fa-star fa-2x opacity-50"></i>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card bg-info text-white">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <div>
                        <div class="fs-4 fw-bold" id="jur-cli-receita-mes">R$ 0</div>
                        <small>Receita Mês</small>
                    </div>
                    <i class="fas fa-dollar-sign fa-2x opacity-50"></i>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Top Clientes com Score IA -->
<div class="card mb-4">
    <div class="card-header">
        <h5 class="mb-0"><i class="fas fa-trophy text-warning"></i> Top Clientes - Score de Retenção
            (IA)</h5>
    </div>
    <div class="card-body" id="jur-cli-top-clientes">
        <p class="text-muted text-center">Carregando análise de clientes...</p>
    </div>
</div>

<!-- Lista de Clientes -->
<div class="card">
    <div class="card-header d-flex justify-content-between">
        <span>Clientes Cadastrados</span>
        <div class="btn-group btn-group-sm">
            <button class="btn btn-outline-secondary" data-view="grid"><i class="fas fa-th"></i></button>
            <button class="btn btn-outline-secondary active" data-view="list"><i class="fas fa-list"></i></button>
        </div>
    </div>
    <div class="card-body">
        <div class="mb-3 d-flex justify-content-end">
            <div class="input-group" style="max-width: 300px;">
                <span class="input-group-text"><i class="fas fa-filter"></i></span>
                <select class="form-select" id="filtro-empresa-funcionarios">
                    <option value="">Filtrar por Empresa...</option>
                    <!-- Opções preenchidas via JS -->
                </select>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>CPF/CNPJ</th>
                        <th>Processos</th>
                        <th>Última Interação</th>
                        <th>Score IA</th>
                        <th>Satisfação</th>
                        <th width="150">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-clientes-juridicos">
                    <tr>
                        <td colspan="7" class="text-center">Carregando clientes...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<h2 class="page-title">ISO 9001 - Painel de Manutenção</h2>
<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <div class="d-flex gap-2">
        <button class="btn btn-secondary" onclick="showSection('iso-maquinas')">
            <i class="fas fa-cogs"></i> Gerenciar Máquinas
        </button>
        <button class="btn btn-secondary" onclick="showSection('iso-mecanicos')">
            <i class="fas fa-user-hard-hat"></i> Gerenciar Mecânicos
        </button>
    </div>
<button class="btn btn-success me-2" id="btn-config-whatsapp" onclick="abrirConfigWhatsApp()" title="Configurar WhatsApp Supervisor → Mecânicos">
        <i class="fab fa-whatsapp"></i> WhatsApp
    </button>
    <button class="btn btn-primary" id="btn-novo-chamado-manutencao">
        <i class="fas fa-plus-circle"></i> Abrir Chamado
    </button>
</div>
<div class="card mb-4">
    <div class="card-body">
        <div class="row g-2 align-items-end">
            <div class="col-md-3">
                <label for="filtro-manut-setor" class="form-label form-label-sm">Setor</label>
                <select id="filtro-manut-setor" class="form-select form-select-sm"></select>
            </div>
            <div class="col-md-3">
                <label for="filtro-manut-inicio" class="form-label form-label-sm">Data Início</label>
                <input type="date" class="form-control form-control-sm" id="filtro-manut-inicio">
            </div>
            <div class="col-md-3">
                <label for="filtro-manut-fim" class="form-label form-label-sm">Data Fim</label>
                <input type="date" class="form-control form-control-sm" id="filtro-manut-fim">
            </div>
            <div class="col-md-3">
                <button class="btn btn-primary w-100" id="btn-filtrar-manutencao">
            <i class="fas fa-filter"></i> Aplicar
        </button>
    </div>
</div>
<div class="row mb-5 mt-4">
    <div class="col-12">
        <div class="row g-4" id="metricas-manutencao">
            <!-- Métricas de chamados abertos/fechados serão inseridas aqui -->
        </div>
    </div>
</div>
<div class="card">
    <div class="card-header">Chamados de Manutenção</div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Máquina</th>
                        <th>Aberto por</th>
                        <th>Motivo</th>
                        <th>Abertura</th>
                        <th>Encerramento</th>
                        <th>Tempo de Parada</th>
                        <th>Prioridade</th>
                        <th>Status</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-chamados-manutencao">
                    <tr>
                        <td colspan="8" class="text-center">Carregando chamados...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

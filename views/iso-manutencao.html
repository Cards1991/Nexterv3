<h2 class="page-title">ISO 9001 - Painel de Manutenção</h2>
<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <div class="d-flex gap-2">
        <button class="btn btn-secondary" onclick="showSection('iso-maquinas')">
            <i class="fas fa-cogs"></i> Gerenciar Máquinas
        </button>
        <button class="btn btn-secondary" onclick="showSection('iso-mecanicos')">
            <i class="fas fa-user-hard-hat"></i> Gerenciar Mecânicos
        </button>
    </div>
    <button class="btn btn-primary" id="btn-novo-chamado-manutencao">
        <i class="fas fa-plus-circle"></i> Abrir Chamado
    </button>
</div>
<div class="card mb-4">
    <div class="card-body d-flex align-items-center gap-3 flex-wrap">
        <label class="form-label mb-0">Filtrar por Data:</label>
        <input type="date" class="form-control" id="filtro-manut-inicio" style="max-width: 180px;">
        <label class="form-label mb-0">até</label>
        <input type="date" class="form-control" id="filtro-manut-fim" style="max-width: 180px;">
        <button class="btn btn-primary" id="btn-filtrar-manutencao">
            <i class="fas fa-filter"></i> Aplicar
        </button>
    </div>
</div>
<div class="row" id="metricas-manutencao">
    <!-- Métricas de chamados abertos/fechados serão inseridas aqui -->
</div>
<div class="card">
    <div class="card-header">Chamados de Manutenção</div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Máquina</th>
                        <th>Motivo</th>
                        <th>Abertura</th>
                        <th>Encerramento</th>
                        <th>Tempo de Parada</th>
                        <th>Prioridade</th>
                        <th>Status</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-chamados-manutencao">
                    <tr>
                        <td colspan="7" class="text-center">Carregando chamados...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

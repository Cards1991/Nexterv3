<h2 class="page-title">Dashboard de Análise de Atestados</h2>

<!-- Filtros -->
<div class="card mb-4">
    <div class="card-body">
        <div class="row g-3 align-items-end">
            <div class="col-md-3">
                <label class="form-label">Data Início</label>
                <input type="date" class="form-control" id="dash-atest-inicio">
            </div>
            <div class="col-md-3">
                <label class="form-label">Data Fim</label>
                <input type="date" class="form-control" id="dash-atest-fim">
            </div>
            <div class="col-md-3">
                <label class="form-label">Setor</label>
                <select class="form-select" id="dash-atest-setor">
                    <option value="">Todos</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Colaborador</label>
                <select class="form-select" id="dash-atest-colaborador">
                    <option value="">Todos</option>
                </select>
            </div>
            <div class="col-md-3">
                <button class="btn btn-primary w-100" onclick="carregarDashboardAtestados()">
                    <i class="fas fa-filter me-2"></i> Filtrar
                </button>
            </div>
        </div>
    </div>
</div>

<!-- KPIs -->
<div class="row mb-4">
    <div class="col-md-3 mb-3">
        <div class="card stat-card h-100 border-primary">
            <div class="card-body">
                <h6 class="text-muted">Total Atestados</h6>
                <h2 id="kpi-atest-total">0</h2>
            </div>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="card stat-card h-100 border-warning">
            <div class="card-body">
                <h6 class="text-muted">Dias Perdidos</h6>
                <h2 id="kpi-atest-dias">0</h2>
            </div>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="card stat-card h-100 border-danger">
            <div class="card-body">
                <h6 class="text-muted">Custo Estimado</h6>
                <h2 id="kpi-atest-custo">R$ 0,00</h2>
            </div>
        </div>
    </div>
    <div class="col-md-3 mb-3">
        <div class="card stat-card h-100 border-info">
            <div class="card-body">
                <h6 class="text-muted">Média Dias/Atestado</h6>
                <h2 id="kpi-atest-media">0</h2>
            </div>
        </div>
    </div>
</div>

<!-- Gráficos -->
<div class="row">
    <!-- Mapa de Calor Corporal -->
    <div class="col-lg-4 mb-4">
        <div class="card h-100">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>Mapa de Calor Corporal</span>
                <button class="btn btn-sm btn-outline-secondary" onclick="exportarMapaCorporal()" title="Baixar PNG">
                    <i class="fas fa-download"></i>
                </button>
            </div>
            <div class="card-body d-flex justify-content-center align-items-center position-relative bg-light rounded">
                <div id="body-map-container" style="height: 500px; width: 100%; position: relative; overflow: hidden;">
                </div>
                <div id="body-map-tooltip"
                    style="position: absolute; display: none; background: rgba(0,0,0,0.8); color: white; padding: 5px 10px; border-radius: 4px; font-size: 12px; pointer-events: none; z-index: 100;">
                </div>
                <div id="body-map-legend"
                    class="position-absolute bottom-0 end-0 m-2 bg-white p-2 border rounded shadow-sm"
                    style="font-size: 10px;">
                    <!-- Legenda gerada via JS -->
                </div>
            </div>
        </div>
    </div>
    <div class="col-lg-6 mb-4">
        <div class="card h-100">
            <div class="card-header">Evolução Mensal (Qtd. Atestados)</div>
            <div class="card-body" style="height: 300px;"><canvas id="chart-atest-evolucao"></canvas></div>
        </div>
    </div>
    <div class="col-lg-6 mb-4">
        <div class="card h-100">
            <div class="card-header">Distribuição por Tipo</div>
            <div class="card-body" style="height: 300px;"><canvas id="chart-atest-tipo"></canvas>
            </div>
        </div>
    </div>
    <div class="col-lg-6 mb-4">
        <div class="card h-100">
            <div class="card-header">Top 5 Setores (Dias Perdidos)</div>
            <div class="card-body" style="height: 300px;"><canvas id="chart-atest-setores"></canvas>
            </div>
        </div>
    </div>
    <div class="col-lg-6 mb-4">
        <div class="card h-100">
            <div class="card-header">Top 5 Colaboradores (Qtd. Atestados)</div>
            <div class="card-body" style="height: 300px;"><canvas id="chart-atest-colaboradores"></canvas></div>
        </div>
    </div>
</div>

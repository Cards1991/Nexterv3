<section id="dashboard-atividades" class="content-section d-none">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <h2 class="page-title mb-0">Gestão de Atividades</h2>
                            <p class="text-muted mb-0">Visão geral de desempenho e pendências da equipe.</p>
                        </div>
                        <div class="d-flex gap-2 flex-wrap justify-content-end">
                            <div class="d-flex align-items-center gap-2">
                                <input type="date" class="form-control" id="dash-ativ-data-inicio" title="Data Início">
                                <span class="text-muted">-</span>
                                <input type="date" class="form-control" id="dash-ativ-data-fim" title="Data Fim">
                            </div>
                            <select class="form-select" id="dash-ativ-filtro-usuario" style="max-width: 200px;" onchange="carregarDadosDashboardAtividades()">
                                <option value="">Todos os Usuários</option>
                            </select>
                            <select class="form-select" id="dash-ativ-filtro-status" style="max-width: 150px;" onchange="carregarDadosDashboardAtividades()">
                                <option value="">Todos Status</option>
                                <option value="Aberto">Aberto</option>
                                <option value="Em Andamento">Em Andamento</option>
                                <option value="Pausado">Pausado</option>
                                <option value="Concluído">Concluído</option>
                                <option value="Atrasado">Atrasado</option>
                            </select>
                            <div class="btn-group" role="group">
                                <input type="radio" class="btn-check" name="dash-ativ-modo" id="btn-modo-equipe" autocomplete="off" checked onclick="alternarModoDashboardAtividades('equipe')">
                                <label class="btn btn-outline-primary" for="btn-modo-equipe"><i class="fas fa-users me-2"></i>Equipe</label>

                                <input type="radio" class="btn-check" name="dash-ativ-modo" id="btn-modo-pessoal" autocomplete="off" onclick="alternarModoDashboardAtividades('pessoal')">
                                <label class="btn btn-outline-primary" for="btn-modo-pessoal"><i class="fas fa-user-check me-2"></i>Meu Desempenho</label>
                            </div>
                            <button class="btn btn-outline-secondary" onclick="carregarDadosDashboardAtividades()" title="Atualizar">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Área de Alertas (Prioridade Máxima) -->
                    <div id="dash-ativ-alertas" class="mb-4"></div>

                    <!-- KPIs -->
                    <div class="row row-cols-1 row-cols-md-2 row-cols-xl-5 g-3 mb-4">
                        <div class="col">
                            <div class="card border-0 shadow-sm h-100" style="border-left: 4px solid #0d6efd !important;">
                                <div class="card-body">
                                    <div class="text-muted small text-uppercase fw-bold">Total Atribuídas</div>
                                    <div class="d-flex align-items-center justify-content-between mt-2">
                                        <h3 class="mb-0 text-primary" id="dash-ativ-total">0</h3>
                                        <i class="fas fa-tasks fa-2x text-gray-300 opacity-25"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col">
                            <div class="card border-0 shadow-sm h-100" style="border-left: 4px solid #ffc107 !important;">
                                <div class="card-body">
                                    <div class="text-muted small text-uppercase fw-bold">Pendentes</div>
                                    <div class="d-flex align-items-center justify-content-between mt-2">
                                        <h3 class="mb-0 text-warning" id="dash-ativ-pendentes">0</h3>
                                        <i class="fas fa-clock fa-2x text-gray-300 opacity-25"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col">
                            <div class="card border-0 shadow-sm h-100" style="border-left: 4px solid #dc3545 !important;">
                                <div class="card-body">
                                    <div class="text-muted small text-uppercase fw-bold">Em Atraso</div>
                                    <div class="d-flex align-items-center justify-content-between mt-2">
                                        <h3 class="mb-0 text-danger" id="dash-ativ-atrasadas">0</h3>
                                        <i class="fas fa-exclamation-circle fa-2x text-gray-300 opacity-25"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col">
                            <div class="card border-0 shadow-sm h-100" style="border-left: 4px solid #198754 !important;">
                                <div class="card-body">
                                    <div class="text-muted small text-uppercase fw-bold">Concluídas</div>
                                    <div class="d-flex align-items-center justify-content-between mt-2">
                                        <h3 class="mb-0 text-success" id="dash-ativ-concluidas">0</h3>
                                        <i class="fas fa-check-circle fa-2x text-gray-300 opacity-25"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col">
                            <div class="card border-0 shadow-sm h-100" style="border-left: 4px solid #6610f2 !important;">
                                <div class="card-body">
                                    <div class="text-muted small text-uppercase fw-bold">Tempo Médio</div>
                                    <div class="d-flex align-items-center justify-content-between mt-2">
                                        <h3 class="mb-0" style="color: #6610f2;" id="dash-ativ-tempo-medio">-</h3>
                                        <i class="fas fa-stopwatch fa-2x text-gray-300 opacity-25"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <!-- Lista de Atividades -->
                        <div class="col-lg-8 mb-4">
                            <div class="card h-100 shadow-sm">
                                <div class="card-header bg-white py-3">
                                    <h5 class="mb-0 text-gray-800">Visão Geral das Atividades</h5>
                                </div>
                                <div class="card-body p-0">
                                    <div class="table-responsive" style="max-height: 500px; overflow-y: auto;">
                                        <table class="table table-hover align-middle mb-0">
                                            <thead class="table-light sticky-top">
                                                <tr>
                                                    <th class="ps-4">Status</th>
                                                    <th>Atividade</th>
                                                    <th>Responsável</th>
                                                    <th>Prazo</th>
                                                    <th>Duração</th>
                                                    <th class="text-end pe-4">Ações</th>
                                                </tr>
                                            </thead>
                                            <tbody id="tabela-dashboard-atividades">
                                                <tr><td colspan="6" class="text-center py-4">Carregando...</td></tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Gráficos Laterais -->
                        <div class="col-lg-4">
                            <div class="card shadow-sm mb-4">
                                <div class="card-header bg-white py-3">
                                    <h6 class="mb-0 fw-bold">Status Geral</h6>
                                </div>
                                <div class="card-body d-flex justify-content-center" style="height: 250px;">
                                    <canvas id="grafico-atividades-status"></canvas>
                                </div>
                            </div>

                            <div class="card shadow-sm">
                                <div class="card-header bg-white py-3">
                                    <h6 class="mb-0 fw-bold">Carga por Responsável</h6>
                                </div>
                                <div class="card-body" style="height: 250px;">
                                    <canvas id="grafico-atividades-responsavel"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

<!-- Modal de Importação de Funcionários -->
<div class="modal fade" id="importarFuncionariosModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-file-import me-2"></i>Importar Funcionários via CSV</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Selecione o arquivo CSV preenchido a partir do modelo exportado. As colunas devem seguir
                    exatamente a ordem do modelo.</p>
                <div class="mb-3">
                    <label for="csv-file-input" class="form-label">Arquivo CSV</label>
                    <input class="form-control" type="file" id="csv-file-input" accept=".csv">
                </div>
                <div id="importacao-resultado" class="mt-3" style="display: none;">
                    <h6>Resultado da Importação:</h6>
                    <div id="importacao-resumo"></div>
                    <div id="importacao-erros-container" class="mt-2" style="max-height: 200px; overflow-y: auto;">
                        <ul id="importacao-erros-lista" class="list-group"></ul>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                <button type="button" class="btn btn-primary" id="btn-iniciar-importacao"
                    onclick="processarArquivoCSV()">Iniciar Importação</button>
            </div>
        </div>
    </div>
</div>

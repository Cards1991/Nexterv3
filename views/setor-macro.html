<div class="container-fluid mt-4">
    <h2>Gestão de Setores Macro</h2>
    <p>Crie e gerencie setores macro para agrupar múltiplos setores.</p>

    <div class="card">
        <div class="card-body">
            <div class="row">
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="macro-setor-nome" class="form-label">Nome do Setor Macro</label>
                        <input type="text" class="form-control" id="macro-setor-nome" placeholder="Ex: Macro Administrativo">
                    </div>
                    <button type="button" class="btn btn-success btn-sm" id="btn-novo-macro-setor">
                        <i class="fas fa-plus"></i> Novo Setor Macro
                    </button>
                </div>
                <div class="col-md-8">
                    <div class="mb-3">
                        <label for="filtro-empresa-setores" class="form-label">Filtrar por Empresa</label>
                        <select id="filtro-empresa-setores" class="form-select mb-2">
                            <!-- Opções de empresa serão carregadas aqui -->
                        </select>
                        
                        <label for="search-setores-disponiveis" class="form-label">Buscar e Selecionar Setores</label>
                        <input type="text" id="search-setores-disponiveis" class="form-control mb-2" placeholder="Digite para buscar...">
                        
                        <div id="lista-setores-container" class="border rounded p-2" style="max-height: 200px; overflow-y: auto;">
                            <!-- Lista de setores com checkboxes será carregada dinamicamente -->
                            <div class="text-center text-muted py-3">
                                <i class="fas fa-spinner fa-spin"></i> Carregando setores...
                            </div>
                        <small class="text-muted">Selecione um ou mais setores usando as checkboxes acima</small>
                    </div>
            </div>
            <button id="btn-salvar-macro-setor" class="btn btn-primary">Salvar Setor Macro</button>
        </div>

    <div class="card mt-4">
        <div class="card-header">
            Setores Macro Cadastrados
        </div>
        <div class="card-body">
            <div id="lista-macro-setores" class="table-responsive">
                <!-- A lista de setores macro será exibida aqui -->
            </div>
    </div>

<!-- Adicionar o script específico para esta página -->
<script src="js/setor-macro.js"></script>

<div class="content-section fade-in" id="entrega-epis">
    <h2 class="page-title">
        <i class="fas fa-shipping-fast text-success me-2"></i>Entrega de EPIs
    </h2>
    
    <div class="alert alert-info">
        <i class="fas fa-info-circle me-2"></i>Selecione o colaborador abaixo e clique em <strong>"Registrar Entrega"</strong> para abrir o modal completo com seleção de itens.
    </div>

    <div class="row mb-4">
        <div class="col-md-8">
            <label class="form-label fw-bold">Colaborador</label>
            <select class="form-select form-select-lg" id="entrega-funcionario-select">
                <option value="">Selecione o colaborador...</option>
            </select>
        </div>
        <div class="col-md-4 d-flex align-items-end">
            <button class="btn btn-success btn-lg w-100" onclick="abrirModalConsumoEPI()" id="btn-registrar-entrega">
                <i class="fas fa-shipping-fast me-2"></i>Registrar Entrega
            </button>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-header">
                    <i class="fas fa-clock text-warning me-2"></i>Últimas Entregas
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-sm mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Data</th>
                                    <th>Colaborador</th>
                                    <th>Itens</th>
                                </tr>
                            </thead>
                            <tbody id="ultimas-entregas-tbody">
                                <tr><td colspan="3" class="text-center text-muted">Carregando...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between">
                    <span><i class="fas fa-chart-pie text-info me-2"></i>EPIs Mais Entregues</span>
                    <small class="text-muted">Hoje</small>
                </div>
                <div class="card-body">
                    <canvas id="chart-epis-entregues" height="200"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let chartEntregas = null;

// Inicializar ao carregar a view
document.addEventListener('DOMContentLoaded', async function() {
    // Carrega funcionários ativos
    if (typeof carregarSelectFuncionariosAtivos === 'function') {
        await carregarSelectFuncionariosAtivos('entrega-funcionario-select');
    }
    
    // Listener para habilitar botão quando funcionário selecionado
    document.getElementById('entrega-funcionario-select').addEventListener('change', function() {
        document.getElementById('btn-registrar-entrega').disabled = !this.value;
    });
    
    // Carrega dados das últimas entregas e gráfico
    carregarUltimasEntregas();
    carregarGraficoEPIsEntregues();
});

async function carregarUltimasEntregas() {
    const tbody = document.getElementById('ultimas-entregas-tbody');
    try {
        const hoje = new Date();
        hoje.setHours(0, 0, 0, 0);
        
        const snapshot = await db.collection('epi_consumo')
            .where('dataEntrega', '>=', hoje)
            .orderBy('dataEntrega', 'desc')
            .limit(10)
            .get();
            
        if (snapshot.empty) {
            tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted py-3">Nenhuma entrega hoje</td></tr>';
            return;
        }
        
        tbody.innerHTML = snapshot.docs.map(doc => {
            const data = doc.data();
            const dataEntrega = data.dataEntrega?.toDate().toLocaleDateString('pt-BR');
            return `
                <tr>
                    <td><small class="text-muted">${dataEntrega}</small></td>
                    <td>${data.funcionarioNome}</td>
                    <td><span class="badge bg-primary">${data.quantidade || 0} itens</span></td>
                </tr>
            `;
        }).join('');
    } catch (error) {
        console.error('Erro ao carregar últimas entregas:', error);
        tbody.innerHTML = '<tr><td colspan="3" class="text-center text-danger">Erro ao carregar</td></tr>';
    }
}

async function carregarGraficoEPIsEntregues() {
    const canvas = document.getElementById('chart-epis-entregues');
    if (!canvas) return;
    
    try {
        const hoje = new Date();
        hoje.setHours(0, 0, 0, 0);
        
        const snapshot = await db.collection('epi_consumo')
            .where('dataEntrega', '>=', hoje)
            .get();
            
        const epiCounts = {};
        snapshot.forEach(doc => {
            const data = doc.data();
            const epi = data.epiDescricao || 'Não identificado';
            epiCounts[epi] = (epiCounts[epi] || 0) + (data.quantidade || 1);
        });
        
        const labels = Object.keys(epiCounts).slice(0, 5); // Top 5
        const data = labels.map(label => epiCounts[label]);
        
        if (chartEntregas) chartEntregas.destroy();
        
        chartEntregas = new Chart(canvas, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF']
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom'
                    }
                }
            }
        });
    } catch (error) {
        console.error('Erro ao carregar gráfico:', error);
    }
}
</script>

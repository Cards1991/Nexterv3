<style>
    /* Estilos mobile-friendly para Meus Chamados */
    .chamado-card {
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        border: none;
        margin-bottom: 15px;
        transition: transform 0.2s;
    }
    .chamado-card:active {
        transform: scale(0.98);
    }
    .chamado-card-header {
        background-color: #f8f9fa;
        border-bottom: 1px solid #e9ecef;
        border-top-left-radius: 12px;
        border-top-right-radius: 12px;
        padding: 12px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .chamado-card-body {
        padding: 15px;
    }
    .chamado-card-footer {
        background-color: transparent;
        border-top: 1px solid #e9ecef;
        padding: 12px 15px;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
    }
    .badge-status {
        font-size: 0.85rem;
        padding: 5px 10px;
        border-radius: 20px;
    }
    .info-label {
        font-size: 0.8rem;
        color: #6c757d;
        margin-bottom: 2px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .info-value {
        font-weight: 500;
        color: #212529;
        margin-bottom: 10px;
    }
</style>

<div class="container-fluid px-2 py-3">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="m-0 fw-bold text-primary">Meus Chamados</h3>
        <button class="btn btn-primary rounded-circle shadow-sm" style="width: 45px; height: 45px;" onclick="window.atualizarMeusChamados && window.atualizarMeusChamados()">
            <i class="fas fa-sync-alt"></i>
        </button>
    </div>

    <div class="row mb-3" id="metricas-mecanico">
        <!-- Métricas pessoais carregadas via JS -->
    </div>

    <!-- Container dos Cards -->
    <div id="lista-cards-chamados">
        <div class="text-center p-4">
            <i class="fas fa-spinner fa-spin fa-2x text-primary mb-2"></i>
            <p class="text-muted">Carregando seus chamados...</p>
        </div>
    </div>
</div>

<!-- Modal de Finalização -->
<div class="modal fade" id="modalFinalizarChamadoMec" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-success text-white border-0">
                <h5 class="modal-title"><i class="fas fa-check-circle me-2"></i> Finalizar Serviço</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="form-finalizar-chamado-mec">
                    <input type="hidden" id="finalizar-mec-id">
                    <input type="hidden" id="finalizar-mec-maquina-id">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tipo de Manutenção *</label>
                        <select class="form-select" id="finalizar-mec-tipo" required>
                            <option value="">Selecione...</option>
                            <option value="Corretiva">Corretiva</option>
                            <option value="Preventiva">Preventiva</option>
                            <option value="Melhoria">Melhoria</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Motivo da Manutenção *</label>
                        <select class="form-select" id="finalizar-mec-motivo" required>
                            <option value="">Carregando motivos...</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Serviço Realizado / Observações *</label>
                        <textarea class="form-control" id="finalizar-mec-obs" rows="3" placeholder="Descreva o que foi feito..." required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 pt-0 p-4">
                <button type="button" class="btn btn-light w-100 mb-2" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success w-100 m-0" onclick="confirmarFinalizarMeuChamado()">
                    <i class="fas fa-save me-2"></i> Salvar e Finalizar
                </button>
            </div>
        </div>
    </div>
</div>

<script src="js/manutencao-mecanico.js"></script>

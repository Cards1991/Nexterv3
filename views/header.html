<header class="main-header d-flex align-items-center justify-content-between px-4">
    <div class="header-left d-flex align-items-center">
        <button class="btn-toggle-sidebar me-3" id="sidebarToggle">
            <i class="fas fa-bars"></i>
        </button>
        <div class="search-box d-none d-lg-flex">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Pesquisar no sistema..." id="global-search">
        </div>
    </div>

    <div class="header-right d-flex align-items-center gap-3">
        <div class="header-action-btn" title="Notificações">
            <i class="fas fa-bell"></i>
            <span class="notification-dot"></span>
        </div>
        
        <div class="header-action-btn" id="btn-voice-command" title="Comando de Voz">
            <i class="fas fa-microphone"></i>
        </div>

        <div class="user-profile-dropdown d-flex align-items-center gap-2" id="user-display-name">
            <div class="user-avatar">
                <i class="fas fa-user-circle"></i>
            </div>
            <div class="user-info d-none d-md-block">
                <span class="user-name">Carregando...</span>
            </div>
            <i class="fas fa-chevron-down ms-1 opacity-50" style="font-size: 0.7rem;"></i>
        </div>
    </div>
</header>

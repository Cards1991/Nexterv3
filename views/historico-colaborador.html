<div class="container-fluid mt-4">
    <div class="row">
        <!-- Coluna da Lista de Colaboradores -->
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">
                    <h3><i class="fas fa-users me-2"></i>Colaboradores</h3>
                    <input type="text" id="search-colaborador" class="form-control mt-2"
                        placeholder="Pesquisar colaborador...">
                </div>
                <div class="card-body" style="max-height: 80vh; overflow-y: auto;">
                    <div id="colaboradores-list" class="list-group">
                        <!-- A lista de colaboradores será inserida aqui via JS -->
                        <p class="text-center text-muted">Carregando...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Coluna do Histórico -->
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h3 id="historico-header">
                        <i class="fas fa-history me-2"></i>Histórico do Colaborador
                    </h3>
                </div>
                <div class="card-body" id="historico-container-body" style="max-height: 80vh; overflow-y: auto;">
                    <div id="historico-timeline" class="timeline">
                        <!-- O histórico será inserido aqui via JS -->
                        <div class="text-center text-muted mt-5">
                            <i class="fas fa-arrow-left fa-2x"></i>
                            <p class="mt-2">Selecione um colaborador à esquerda para ver seu
                                histórico.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

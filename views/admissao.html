<h2 class="page-title">Admissão</h2>
<div class="card mb-4">
    <div class="card-header"><i class="fas fa-user-plus text-success"></i> Novo Funcionário</div>
    <div class="card-body">
        <!-- Abas de Navegação -->
        <ul class="nav nav-tabs" id="admissaoTab" role="tablist">
            <li class="nav-item" role="presentation"><button class="nav-link active" id="admissao-identificacao-tab"
                    data-bs-toggle="tab" data-bs-target="#admissao-tab-identificacao" type="button"
                    role="tab">Identificação</button></li>
            <li class="nav-item" role="presentation"><button class="nav-link" id="admissao-profissional-tab"
                    data-bs-toggle="tab" data-bs-target="#admissao-tab-profissional" type="button"
                    role="tab">Profissional</button></li>
            <li class="nav-item" role="presentation"><button class="nav-link" id="admissao-qualificacao-tab"
                    data-bs-toggle="tab" data-bs-target="#admissao-tab-qualificacao" type="button"
                    role="tab">Qualificação</button></li>
            <li class="nav-item" role="presentation"><button class="nav-link" id="admissao-desempenho-tab"
                    data-bs-toggle="tab" data-bs-target="#admissao-tab-desempenho" type="button"
                    role="tab">Desempenho</button></li>
            <li class="nav-item" role="presentation"><button class="nav-link" id="admissao-beneficios-tab"
                    data-bs-toggle="tab" data-bs-target="#admissao-tab-beneficios" type="button"
                    role="tab">Benefícios</button></li>
        </ul>

        <form id="form-admissao" class="mt-3">
            <div class="tab-content" id="admissaoTabContent">
                <!-- Conteúdo das abas será o mesmo do modal de funcionários -->
                <!-- Aba de Identificação -->
                <div class="tab-pane fade show active" id="admissao-tab-identificacao" role="tabpanel">
                    <div class="row g-3">
                        <div class="col-md-8"><label class="form-label">Nome Completo</label><input type="text"
                                class="form-control" id="nome-funcionario-admissao" required></div>
                        <div class="col-md-4"><label class="form-label">Matrícula</label><input type="text"
                                class="form-control" id="matricula-funcionario-admissao"></div>
                        <div class="col-md-4"><label class="form-label">CPF</label><input type="text"
                                class="form-control" id="cpf-funcionario-admissao" required></div>
                        <div class="col-md-4"><label class="form-label">RG</label><input type="text"
                                class="form-control" id="rg-funcionario-admissao"></div>
                        <div class="col-md-4"><label class="form-label">Data de
                                Nascimento</label><input type="date" class="form-control"
                                id="nascimento-funcionario-admissao" required></div>
                        <div class="col-md-4"><label class="form-label">Sexo</label><select class="form-select"
                                id="sexo-funcionario-admissao" required>
                                <option value="">Selecione...</option>
                                <option value="Masculino">Masculino</option>
                                <option value="Feminino">Feminino</option>
                                <option value="Outro">Outro</option>
                            </select></div>
                        <div class="col-md-4"><label class="form-label">E-mail</label><input type="email"
                                class="form-control" id="email-funcionario-admissao">
                        </div>
                        <div class="col-md-4"><label class="form-label">Telefone</label><input type="tel"
                                class="form-control" id="telefone-funcionario-admissao">
                        </div>
                    </div>
                </div>

                <!-- Aba Profissional -->
                <div class="tab-pane fade" id="admissao-tab-profissional" role="tabpanel">
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label">Empresa</label><select class="form-select"
                                id="empresa-funcionario-admissao" required></select></div>
                        <div class="col-md-6"><label class="form-label">Setor</label><select class="form-select"
                                id="setor-funcionario-admissao" required></select></div>
                        <div class="col-md-6"><label class="form-label">Cargo</label><select class="form-select"
                                id="cargo-funcionario-admissao" required></select></div>
                        <div class="col-md-6"><label class="form-label">Líder
                                Imediato</label><select class="form-select" id="lider-funcionario-admissao"></select>
                        </div>
                        <div class="col-md-4"><label class="form-label">Data de
                                Admissão</label><input type="date" class="form-control"
                                id="admissao-funcionario-admissao" required></div>
                        <div class="col-md-4"><label class="form-label">Salário</label><input type="number" step="0.01"
                                min="0" class="form-control" id="salario-funcionario-admissao"
                                placeholder="Ex: 2500.00"></div>
                        <div class="col-md-4"><label class="form-label">Salário
                                (Extra/Fora)</label><input type="number" step="0.01" min="0" class="form-control"
                                id="salario-por-fora-funcionario-admissao" placeholder="Ex: 500.00"></div>
                        <div class="col-md-4"><label class="form-label">Jornada
                                (h/semana)</label><input type="number" class="form-control"
                                id="jornada-funcionario-admissao" placeholder="Ex: 44"></div>
                        <div class="col-md-4"><label class="form-label">Tipo de
                                Contrato</label><select class="form-select" id="contrato-funcionario-admissao">
                                <option value="CLT">CLT</option>
                                <option value="PJ">PJ</option>
                                <option value="Estágio">Estágio</option>
                                <option value="Aprendiz">Aprendiz</option>
                            </select></div>
                        <div class="col-md-4"><label class="form-label">Regime de
                                Trabalho</label><select class="form-select" id="regime-funcionario-admissao">
                                <option value="Presencial">Presencial</option>
                                <option value="Híbrido">Híbrido</option>
                                <option value="Remoto">Remoto</option>
                            </select></div>
                    </div>
                </div>
                <!-- Outras abas podem ser adicionadas aqui seguindo o mesmo padrão -->
            </div>
            <div class="d-grid mt-4">
                <button type="button" class="btn btn-success btn-lg" onclick="salvarFuncionario('admissao')">
                    <i class="fas fa-check-circle"></i> Concluir Admissão
                </button>
            </div>
        </form>
    </div>
</div>

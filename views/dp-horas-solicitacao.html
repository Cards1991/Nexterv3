
    <h2 class="page-title">Solicitação de Horas Extras</h2>
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div>
            <p class="text-muted mb-0">Aqui o gerente pode solicitar intervalo de horas extras para um
                funcionário.</p>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-primary" onclick="abrirDashboardSolicitante()">
                <i class="fas fa-chart-line"></i> Meu Dashboard
            </button>
            <button class="btn btn-info text-white" onclick="replicarSelecionados()">
                <i class="fas fa-copy"></i> Replicar Selecionados (Dia Seguinte)
            </button>
            <button class="btn btn-primary" onclick="abrirModalSolicitacaoHoras()"><i class="fas fa-plus-circle"></i>
                Nova Solicitação</button>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <span>Minhas Solicitações</span>
            <div class="mt-3">
                <div class="row g-2 align-items-end">
                    <div class="col-md-2"><label for="sol-filtro-data-inicio"
                            class="form-label form-label-sm">De:</label><input type="date" id="sol-filtro-data-inicio"
                            class="form-control form-control-sm"></div>
                    <div class="col-md-2"><label for="sol-filtro-data-fim"
                            class="form-label form-label-sm">Até:</label><input type="date" id="sol-filtro-data-fim"
                            class="form-control form-control-sm"></div>
                    <div class="col-md-2">
                        <label for="sol-filtro-setor" class="form-label form-label-sm">Setor:</label>
                        <select id="sol-filtro-setor" class="form-select form-select-sm">
                            <option value="">Todos os Setores</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label for="sol-filtro-periodo" class="form-label form-label-sm">Período:</label>
                        <select id="sol-filtro-periodo" class="form-select form-select-sm">
                            <option value="">Todos</option>
                            <option value="manha">Manhã</option>
                            <option value="tarde">Tarde</option>
                            <option value="noite">Noite</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label for="sol-filtro-usuario" class="form-label form-label-sm">Solicitante:</label>
                        <select id="sol-filtro-usuario" class="form-select form-select-sm">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex justify-content-end"><button class="btn btn-primary btn-sm w-100"
                            id="sol-btn-filtrar"><i class="fas fa-filter"></i> Filtrar</button></div>
                </div>
            </div>
        </div>
        <div class="card-body p-0">
            <div id="minhas-solicitacoes-container" class="table-responsive"
                style="max-height: 500px; overflow-y: auto;">Carregando...</div>
        </div>
    </div>

    <!-- Modal de Nova Solicitação -->
    <div class="modal fade" id="solicitacaoHorasModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="fas fa-clock me-2"></i>Nova Solicitação de Horas Extras</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <!-- Adicionado onsubmit="return false" para prevenir recarregamento -->
                    <form id="form-solicitacao-horas" onsubmit="return false;">
                        <input type="hidden" id="sol-id">
                        <div class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label">Funcionário *</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-search"></i></span>
                                    <input type="text" class="form-control" id="sol-employee-search" placeholder="Filtrar funcionário...">
                                </div>
                                <select class="form-select mt-1" id="sol-employee" required size="5">
                                    <option value="">Carregando...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Data *</label>
                                <input type="date" class="form-control" id="sol-start-date" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Início *</label>
                                <input type="time" class="form-control" id="sol-start-time" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Fim *</label>
                                <input type="time" class="form-control" id="sol-end-time" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Setor</label>
                                <input type="text" class="form-control" id="sol-sector" readonly tabindex="-1" placeholder="Automático">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Gerente Responsável</label>
                                <input type="text" class="form-control" id="sol-requester" readonly tabindex="-1" placeholder="Automático">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Forma de Pagamento *</label>
                                <select class="form-select" id="sol-forma-pagamento" required>
                                    <option value="por-fora">Por Fora (Padrão)</option>
                                    <option value="folha">Folha de Pagamento</option>
                                    <option value="banco-horas">Banco de Horas</option>
                                </select>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Motivo *</label>
                                <textarea class="form-control" id="sol-reason" rows="2" required placeholder="Descreva o motivo da hora extra..."></textarea>
                            </div>
                        </div>
                        <div class="modal-footer px-0 pb-0 mt-3 border-top-0">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane me-1"></i> Enviar Solicitação</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

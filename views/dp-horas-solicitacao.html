<section id="dp-horas-solicitacao" class="content-section d-none">
    <h2 class="page-title">Solicitação de Horas Extras</h2>
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div>
            <p class="text-muted mb-0">Aqui o gerente pode solicitar intervalo de horas extras para um
                funcionário.</p>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-primary" onclick="abrirDashboardSolicitante()">
                <i class="fas fa-chart-line"></i> Meu Dashboard
            </button>
            <button class="btn btn-info text-white" onclick="replicarSelecionados()">
                <i class="fas fa-copy"></i> Replicar Selecionados (Dia Seguinte)
            </button>
            <button class="btn btn-primary" onclick="abrirModalSolicitacaoHoras()"><i class="fas fa-plus-circle"></i>
                Nova Solicitação</button>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <span>Minhas Solicitações</span>
            <div class="mt-3">
                <div class="row g-2 align-items-end">
                    <div class="col-md-2"><label for="sol-filtro-data-inicio"
                            class="form-label form-label-sm">De:</label><input type="date" id="sol-filtro-data-inicio"
                            class="form-control form-control-sm"></div>
                    <div class="col-md-2"><label for="sol-filtro-data-fim"
                            class="form-label form-label-sm">Até:</label><input type="date" id="sol-filtro-data-fim"
                            class="form-control form-control-sm"></div>
                    <div class="col-md-2">
                        <label for="sol-filtro-setor" class="form-label form-label-sm">Setor:</label>
                        <select id="sol-filtro-setor" class="form-select form-select-sm">
                            <option value="">Todos os Setores</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label for="sol-filtro-periodo" class="form-label form-label-sm">Período:</label>
                        <select id="sol-filtro-periodo" class="form-select form-select-sm">
                            <option value="">Todos</option>
                            <option value="manha">Manhã</option>
                            <option value="tarde">Tarde</option>
                            <option value="noite">Noite</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label for="sol-filtro-usuario" class="form-label form-label-sm">Solicitante:</label>
                        <select id="sol-filtro-usuario" class="form-select form-select-sm">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex justify-content-end"><button class="btn btn-primary btn-sm w-100"
                            id="sol-btn-filtrar"><i class="fas fa-filter"></i> Filtrar</button></div>
                </div>
            </div>
        </div>
        <div class="card-body p-0">
            <div id="minhas-solicitacoes-container" class="table-responsive"
                style="max-height: 500px; overflow-y: auto;">Carregando...</div>
        </div>
    </div>
</section>

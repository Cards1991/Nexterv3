<!-- Modal Replicação em Lote -->
<div class="modal fade" id="replicacaoLoteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="fas fa-copy me-2"></i>Replicar / Lançamento em Lote</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label small fw-bold">Data</label>
                        <input type="date" class="form-control" id="rep-lote-data">
                    </div>
                    <div class="col-3">
                        <label class="form-label small fw-bold">Início</label>
                        <input type="time" class="form-control" id="rep-lote-inicio">
                    </div>
                    <div class="col-3">
                        <label class="form-label small fw-bold">Fim</label>
                        <input type="time" class="form-control" id="rep-lote-fim">
                    </div>
                    <div class="col-12">
                        <label class="form-label small fw-bold">Motivo</label>
                        <input type="text" class="form-control" id="rep-lote-motivo" placeholder="Ex: Produção Extra">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">ADICIONAR COLABORADOR À EQUIPE</label>
                    <div class="input-group">
                        <select class="form-select" id="rep-lote-select-funcionario">
                            <option value="">Selecione...</option>
                        </select>
                        <button class="btn btn-outline-primary" type="button"
                            onclick="adicionarFuncionarioReplicacao()">
                            <i class="fas fa-plus"></i> Adicionar
                        </button>
                    </div>
                </div>

                <label class="form-label small fw-bold text-muted">EQUIPE SELECIONADA:</label>
                <ul class="list-group mb-3 shadow-sm" id="rep-lote-lista-funcionarios"
                    style="max-height: 200px; overflow-y: auto;">
                    <!-- Lista dinâmica -->
                </ul>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="confirmarReplicacaoLote()">
                    <i class="fas fa-save me-1"></i> Criar Solicitações
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Autorização de Horas Extras (Visão da Controladoria) -->
<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-clock text-primary me-2"></i>Autorização de Horas Extras</h2>
        <div class="btn-group">
            <button id="auth-btn-imprimir" class="btn btn-outline-secondary">
                <i class="fas fa-print me-1"></i> Imprimir
            </button>
            <button id="auth-btn-exportar" class="btn btn-outline-success">
                <i class="fas fa-file-excel me-1"></i> Exportar
            </button>
            <button id="auth-btn-integrar-custos" class="btn btn-outline-warning">
                <i class="fas fa-coins me-1"></i> Integrar com Análise de Custos
            </button>
        </div>
    </div>

    <!-- Filtros -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Setor</label>
                    <select id="auth-filtro-setor" class="form-select">
                        <option value="">Todos os Setores</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Data Início</label>
                    <input type="date" id="auth-filtro-data-inicio" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Data Fim</label>
                    <input type="date" id="auth-filtro-data-fim" class="form-control">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Status</label>
                    <select id="auth-filtro-status" class="form-select">
                        <option value="">Todos</option>
                        <option value="pendente">Pendente</option>
                        <option value="aprovado">Aprovado</option>
                        <option value="rejeitado">Rejeitado</option>
                        <option value="cancelado">Cancelado</option>
                    </select>
                </div>
                <div class="col-md-1 d-flex align-items-end">
                    <button id="auth-btn-filtrar" class="btn btn-primary w-100">
                        <i class="fas fa-filter"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Tabela de Solicitações -->
    <div id="auth-solicitacoes-table" class="card">
        <div class="card-body">
            <div class="text-center p-5">
                <div class="spinner-border text-primary"></div>
                <p class="mt-2">Carregando solicitações...</p>
            </div>
        </div>
    </div>
</div>

<h2 class="page-title">Cadastro de Destinos</h2>
<div class="d-flex justify-content-end mb-3">
    <button class="btn btn-primary" onclick="abrirModalDestino()"><i class="fas fa-map-marker-alt"></i> Novo
        Destino</button>
</div>
<div class="card">
    <div class="card-header">Destinos e Distâncias</div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Origem</th>
                        <th>Destino</th>
                        <th>Distância (Km)</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-frota-destinos"></tbody>
            </table>
        </div>
    </div>
</div>

<h2 class="page-title">Histórico do Colaborador</h2>
<div class="card">
    <div class="card-header">
        <div class="row align-items-center">
            <div class="col-md-6">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-search"></i></span>
                    <input type="text" class="form-control" id="filtro-historico-colaborador"
                        placeholder="Buscar colaborador por nome...">
                </div>
            </div>
            <div class="col-md-6 text-end mt-2 mt-md-0">
                <button class="btn btn-primary" id="btn-imprimir-historico" disabled
                    onclick="imprimirHistoricoColaborador()">
                    <i class="fas fa-print"></i> Imprimir Histórico
                </button>
            </div>
        </div>
    </div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-4" style="max-height: 65vh; overflow-y: auto;">
                <div class="list-group" id="lista-colaboradores-historico">
                    <!-- Lista de colaboradores será inserida aqui -->
                </div>
            </div>
            <div class="col-md-8" style="max-height: 65vh; overflow-y: auto;">
                <div id="container-detalhes-historico" class="p-3">
                    <div class="text-center text-muted p-5"><i class="fas fa-user-clock fa-3x mb-3"></i>
                        <h5>Selecione um colaborador para ver seu histórico.</h5>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

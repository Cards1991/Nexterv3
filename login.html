<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Nexter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <!-- Background Decor -->
    <div class="bg-decor blob-1"></div>
    <div class="bg-decor blob-2"></div>
    <div class="bg-decor blob-3"></div>

    <div class="login-container">
        <div class="card-floater">
            <div class="login-card">
                <div class="text-center mb-5">
                    <div class="brand-logo-wrapper mb-3">
                        <div class="brand-logo">
                            <i class="fas fa-layer-group"></i>
                        </div>
                    </div>
                    <h1 class="brand-title">NEXTER</h1>
                    <p class="brand-subtitle">SISTEMA DE GESTÃO INTEGRADA</p>
                </div>
                
                <form id="form-login">
                    <div class="form-group mb-4">
                        <label class="input-label">E-mail Corporativo</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="login-email" placeholder="seu.email@crival.com" required>
                        </div>
                    </div>

                    <div class="form-group mb-4">
                        <label class="input-label">Senha de Acesso</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="login-senha" placeholder="••••••••" required>
                            <button type="button" class="btn-toggle-password" onclick="toggleSenhaVisibility()">
                                <i class="fas fa-eye" id="toggle-senha-icon"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="d-grid mt-5">
                        <button type="submit" class="btn btn-login">
                            <span class="btn-text">ACESSAR PAINEL</span>
                            <i class="fas fa-arrow-right ms-2"></i>
                        </button>
                    </div>
                </form>

                <!-- Área de Mensagens de Erro -->
                <div id="login-feedback" class="feedback-area mt-4"></div>

                <div class="security-info mt-5">
                    <div class="divider mb-4"></div>
                    <div class="d-flex align-items-center justify-content-center gap-2">
                        <i class="fas fa-shield-alt text-primary"></i>
                        <span>Acesso Restrito e Criptografado</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-info">
        <p>NEXTER v3.0 &copy; 2026 Calçados Crival LTDA</p>
        <p class="small">Todos os direitos reservados.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    
    <script src="js/env-loader.js"></script>
    <script>
        if (window.__FIREBASE_CONFIG__) {
            firebase.initializeApp(window.__FIREBASE_CONFIG__);
            window.db = firebase.firestore();
            window.auth = firebase.auth();
        }
    </script>
    <script src="js/login.js"></script>
</body>
</html>

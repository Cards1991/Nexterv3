<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abrir Chamado de Manutenção</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- Configuração do Firebase -->
    <script src="js/env-loader.js"></script>

    <style>
        body {
            background-color: #f4f7f6;
        }
        .container {
            max-width: 600px;
        }
        .card-header {
            background-color: #0d6efd;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        
        <!-- Loading Spinner -->
        <div id="loading-spinner" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Carregando...</span>
            </div>
            <p class="mt-3">Inicializando...</p>
        </div>

        <!-- Tela de Login -->
        <div id="login-screen" class="card d-none">
            <div class="card-header bg-primary">
                <h4 class="mb-0"><i class="fas fa-user-lock"></i> Acesso Restrito</h4>
            </div>
            <div class="card-body">
                <div class="text-center mb-4">
                    <i class="fas fa-tools login-icon" style="font-size: 3rem; color: #0d6efd;"></i>
                    <h5 class="mt-3">Abrir Chamado de Manutenção</h5>
                    <p class="text-muted">Faça login para continuar</p>
                </div>
                
                <div id="login-alerts"></div>
                
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" id="login-email" class="form-control" placeholder="seu@email.com">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" id="login-senha" class="form-control" placeholder="******">
                    </div>
                </div>
                <div class="d-grid">
                    <button class="btn btn-primary btn-lg" id="btn-fazer-login" onclick="fazerLogin()">
                        <i class="fas fa-sign-in-alt me-2"></i> Entrar
                    </button>
                </div>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <small class="text-muted">
                        <i class="fas fa-info-circle"></i> Use suas credenciais do sistema Nexter
                    </small>
                </div>
            </div>
        </div>

        <!-- Formulário de Chamado -->
        <div id="form-container" class="card d-none">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h4 class="mb-0"><i class="fas fa-tools"></i> Abrir Chamado</h4>
                <button class="btn btn-outline-light btn-sm" onclick="fazerLogout()" title="Sair">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
            <div class="card-body">
                <!-- Informações da Máquina -->
                <div id="maquina-info" class="d-none"></div>
                
                <!-- Formulário -->
                <div class="mb-3">
                    <label class="form-label fw-bold">Máquina</label>
                    <input type="text" class="form-control form-control-lg" id="mobile-maquina-id" readonly>
                </div>
                <div class="mb-3">
                    <label for="mobile-motivo" class="form-label fw-bold">Motivo da Parada / Problema</label>
                    <textarea class="form-control" id="mobile-motivo" rows="4" placeholder="Descreva o problema observado..." required></textarea>
                    <div class="text-end">
                        <small class="text-muted"><span id="motivo-counter">0/500</span></small>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Prioridade</label>
                    <select class="form-select" id="mobile-prioridade">
                        <option value="Normal">Normal</option>
                        <option value="Baixa">Baixa</option>
                        <option value="Alta">Alta</option>
                    </select>
                </div>
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="mobile-maquina-parada">
                    <label class="form-check-label" for="mobile-maquina-parada">A máquina está parada?</label>
                </div>
                <div class="d-grid">
                    <button class="btn btn-primary btn-lg" id="btn-salvar-chamado-mobile">
                        <i class="fas fa-save"></i> Abrir Chamado
                    </button>
                </div>
            </div>
        </div>

        <!-- Tela de Sucesso -->
        <div id="success-message" class="text-center d-none">
            <div class="card">
                <div class="card-body">
                    <i class="fas fa-check-circle fa-5x text-success mb-3 success-icon"></i>
                    <h3>Chamado Aberto com Sucesso!</h3>
                    <p class="text-muted">ID: <span id="chamado-id"></span></p>
                    <p class="text-muted">Máquina: <span id="chamado-maquina"></span></p>
                    <p class="text-muted">Data: <span id="chamado-data"></span></p>
                    <hr>
                    <p>A equipe de manutenção foi notificada.</p>
                    <div class="d-grid gap-2">
                        <button class="btn btn-primary" onclick="location.reload()">
                            <i class="fas fa-plus-circle"></i> Abrir Novo Chamado
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/manutencao-mobile.js?v=2.0"></script>
    
    <!-- Flag para evitar dupla configuração -->
    <input type="hidden" id="formulario-configurado" value="false">
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Manutenção Mobile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css"> <!-- Reutilizando o estilo do login -->
    <style>
        .tag-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(13, 110, 253, 0.08);
            border: 1.5px solid rgba(13, 110, 253, 0.35);
            color: #0d6efd;
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 13px;
            font-weight: 700;
            margin-top: 6px;
            letter-spacing: 0.5px;
        }
        .tag-badge i { font-size: 12px; }
        .tag-sem-valor { color: #adb5bd; border-color: #dee2e6; background: #f8f9fa; }
        .info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .info-label {
            font-size: 12px;
            font-weight: 600;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            min-width: 70px;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div id="feedback-container" class="position-absolute top-0 end-0 p-3" style="z-index: 1050;"></div>

        <!-- Tela de Login (Oculta por padrão para evitar double-login) -->
        <div class="card-floater" id="login-section" style="display: none;">
            <div class="login-card">
                <div class="text-center mb-4">
                    <div class="brand-icon mb-2"><i class="fas fa-tools"></i></div>
                    <h3 class="brand-title">Manutenção</h3>
                    <p class="text-muted small">Faça login para abrir um chamado.</p>
                </div>
                <form id="form-login-manutencao">
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="login-manutencao-email" placeholder="seu.email@crival.com" required>
                        <label for="login-manutencao-email">E-mail</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="login-manutencao-senha" placeholder="Sua senha" required>
                        <label for="login-manutencao-senha">Senha</label>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-login text-white">Entrar</button>
                    </div>
                </form>
                <div id="login-manutencao-erro" class="alert alert-danger d-none small mt-3"></div>
            </div>
        </div>

        <!-- Formulário de Chamado (Oculto por padrão) -->
        <div class="card-floater d-none" id="chamado-section">
            <div class="login-card">
                <div class="text-center mb-4">
                    <div class="brand-icon mb-2"><i class="fas fa-tools"></i></div>
                    <h3 class="brand-title">Novo Chamado</h3>
                </div>
                <form id="form-chamado-manutencao">
                    <fieldset>
                        <!-- Bloco Máquina + TAG — sempre visível -->
                        <div class="mb-3" style="background:#f8f9fa; border-radius:10px; padding:12px 14px; border:1px solid #dee2e6;">
                            <div class="info-row">
                                <span class="info-label"><i class="fas fa-cogs me-1"></i>Máquina</span>
                                <input type="text" class="form-control form-control-sm bg-white" id="chamado-maquina-nome" readonly style="font-weight:600;">
                                <input type="hidden" id="chamado-maquina-id">
                            </div>
                            <div class="info-row mt-2" id="chamado-tag-row">
                                <span class="info-label"><i class="fas fa-tag me-1"></i>TAG</span>
                                <span class="tag-badge tag-sem-valor" id="chamado-tag-badge">
                                    <span id="chamado-tag-value">Carregando...</span>
                                </span>
                            </div>
                        </div>

                        <div class="mb-3" id="container-motivos-frequentes" style="display:none;">
                            <label class="form-label fw-bold">Motivo da Manutenção *</label>
                            <select class="form-select" id="select-motivo-frequente">
                                <option value="">Selecione um motivo...</option>
                            </select>
                            <div class="mt-2">
                                <input type="text" class="form-control" id="chamado-motivo" placeholder="Ou descreva o motivo manualmente..." required>
                            </div>
                            <small class="text-muted">Selecione uma opção acima ou descreva o motivo no campo.</small>
                        </div>
                        <div class="mb-3" id="container-motivo-simples">
                            <label class="form-label">Motivo da Manutenção *</label>
                            <input type="text" class="form-control" id="chamado-motivo-fallback" placeholder="Ex: Vazamento de óleo, falha no motor" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Observações</label>
                            <textarea class="form-control" id="chamado-obs" rows="2" placeholder="Detalhes adicionais..."></textarea>
                        </div>
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="chamado-maquina-parada">
                            <label class="form-check-label" for="chamado-maquina-parada">
                                <strong><i class="fas fa-exclamation-triangle text-danger"></i> A máquina está parada?</strong>
                            </label>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-login text-white">
                                <i class="fas fa-paper-plane"></i> Abrir Chamado
                            </button>
                        </div>
                    </fieldset>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- Configuração do Firebase específica para o Módulo Mobile -->
    <script src="js/env-loader.js"></script>
    <script src="firebase-config-mobile.js"></script>

    <!-- Utilitários e Lógica da Página -->
    <script src="js/utils.js"></script>
    <script src="js/manutencao-mobile.js"></script>
</body>

</html>

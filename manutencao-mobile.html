<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manutenção Mobile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="modal-title">
                    <i class="fas fa-tools"></i> Abrir Chamado de Manutenção
                </h5>
            </div>
            <div class="card-body">
                <form id="form-chamado-manutencao">
                    <div class="mb-3">
                        <label class="form-label">Máquina *</label>
                        <input type="text" class="form-control" id="chamado-maquina-nome" readonly>
                        <input type="hidden" id="chamado-maquina-id">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tipo de Manutenção *</label>
                        <select class="form-select" id="chamado-tipo-manutencao" required>
                            <option value="Corretiva">Corretiva</option>
                            <option value="Preventiva Mensal">Preventiva Mensal</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Prioridade Inicial</label>
                        <select class="form-select" id="chamado-prioridade">
                            <option value="Normal">Normal</option>
                            <option value="Prioritário">Prioritário</option>
                            <option value="Urgente">Urgente</option>
                        </select>
                    </div>
                     <div class="mb-3">
                        <label class="form-label">Mecânico (Para Notificação)</label>
                        <select class="form-select" id="chamado-mecanico-abertura"><option value="">Selecione...</option></select>
                    </div>
                    <div class="mb-3" id="chamado-mes-container" style="display: none;">
                        <label class="form-label">Mês de Referência</label>
                        <select class="form-select" id="chamado-mes-referencia">
                            <option value="">Selecione o mês...</option>
                            <option value="1">Janeiro</option>
                            <option value="2">Fevereiro</option>
                            <option value="3">Março</option>
                            <option value="4">Abril</option>
                            <option value="5">Maio</option>
                            <option value="6">Junho</option>
                            <option value="7">Julho</option>
                            <option value="8">Agosto</option>
                            <option value="9">Setembro</option>
                            <option value="10">Outubro</option>
                            <option value="11">Novembro</option>
                            <option value="12">Dezembro</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Motivo da Manutenção *</label>
                        <input type="text" class="form-control" id="chamado-motivo" placeholder="Ex: Vazamento de óleo, falha no motor" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Observações</label>
                        <textarea class="form-control" id="chamado-obs" rows="3" placeholder="Detalhes adicionais..."></textarea>
                    </div>
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="chamado-maquina-parada">
                        <label class="form-check-label" for="chamado-maquina-parada">
                            <strong><i class="fas fa-exclamation-triangle text-danger"></i> A máquina está parada?</strong>
                        </label>
                    </div>
                    <div class="d-grid">
                        <button type="button" class="btn btn-primary" onclick="salvarChamadoMobile()">
                            <i class="fas fa-paper-plane"></i> Abrir Chamado
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <!-- Configuração do Firebase e Fallback -->
    <script src="js/env-loader.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        // Garante a inicialização do Firebase se o firebase-config.js falhar
        if (!firebase.apps.length && window.__FIREBASE_CONFIG__) {
            console.warn("⚠️ Inicializando Firebase via env-loader (fallback)...");
            firebase.initializeApp(window.__FIREBASE_CONFIG__);
        }
        if (firebase.apps.length && !window.db) {
            window.db = firebase.firestore();
        }
    </script>
    
    <script src="js/utils.js"></script>
    <script src="js/manutencao-mobile.js"></script>
</body>
</html>
